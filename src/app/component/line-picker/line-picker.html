<div class="np-picker">

  <input
    class="np-picker-input"
    type="text"
    [ngModel]="searchQuery()"
    (ngModelChange)="onInputChange($event)"
    (focus)="showDropdown.set(searchQuery().trim().length > 0)"
    (blur)="hideDropdownWithDelay()"
    placeholder="Cerca una linea...">

  @if (showDropdown() && filteredLines().length > 0) {
    <div class="np-picker-dropdown">
      @for (line of filteredLines(); track line.id) {
        <button
          type="button"
          class="np-picker-item"
          (mousedown)="selectLine(line)">
          <span class="np-picker-item-name">{{ line.name }}</span>
          <span class="np-picker-item-meta">{{ line.provider }} · {{ line.type }}</span>
        </button>
      }
    </div>
  } @else if (showDropdown() && searchQuery().trim().length > 0) {
    <div class="np-picker-dropdown np-picker-empty">
      Nessuna linea trovata
    </div>
  }

</div>
