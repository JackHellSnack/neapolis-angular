<div class="np-login-wrap">
  <div class="np-login-card">
    <!-- Logo -->
    <div class="np-login-brand">
      <span class="np-logo-mark-lg"></span>
      <span class="np-login-title">NeaPolis</span>
    </div>

    <h2>Accedi al tuo account</h2>
    <p class="np-login-sub">Inserisci le tue credenziali per continuare</p>

    @if (error()) {
      <div class="np-banner np-banner-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="np-login-form">
      <div class="np-field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          autocomplete="username"
          placeholder="Il tuo username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          required>
      </div>

      <div class="np-field">
        <label for="password">Password</label>
        <div class="np-pwd-wrap">
          <input
            id="password"
            [type]="showPwd() ? 'text' : 'password'"
            autocomplete="current-password"
            placeholder="La tua password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            required>
          <button type="button" class="np-pwd-toggle" (click)="showPwd.update(v => !v)" tabindex="-1">
            @if (showPwd()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" class="np-btn np-btn-primary np-btn-full" [disabled]="loading()">
        @if (loading()) {
          <span class="np-spinner" style="width:16px;height:16px;border-width:2px;margin-right:6px"></span>
          Accesso in corso...
        } @else {
          Accedi
        }
      </button>
    </form>

    <p class="np-login-back">
      <a routerLink="/home">← Torna alla home</a>
    </p>
  </div>
</div>
